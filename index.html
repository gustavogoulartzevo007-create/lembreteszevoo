<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Lembre Já</title>

<style>
body{
  font-family:Arial;
  margin:0;
  padding:20px;
  background:linear-gradient(135deg,#0b3d2e,#1f7a4c);
}

.container{
  max-width:650px;
  margin:auto;
  background:#f4fff8;
  padding:20px;
  border-radius:15px;
  display:none;
}

input,select,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #1f7a4c;
}

button{
  background:#1f7a4c;
  color:#fff;
  font-weight:bold;
}

button:hover{background:#145c38;}

#login{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0b3d2e,#1f7a4c);
}

.login-box{
  background:#fff;
  padding:25px;
  border-radius:12px;
  width:320px;
  text-align:center;
}

#alertBox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  color:#fff;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.status{
  background:#dfffe0;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">

    <img src="logo.png"
         onerror="this.src='https://via.placeholder.com/120?text=LOGO'"
         style="width:120px;">

    <h2>LOGIN</h2>

    <input id="user" placeholder="Usuário">

    <div style="position:relative;">
      <input id="pass" type="password" placeholder="Senha">
      <span onclick="toggleSenha()" style="position:absolute;right:10px;top:10px;cursor:pointer;">👁️</span>
    </div>

    <label>
      <input type="checkbox" id="salvarSenha"> Salvar senha
    </label>

    <button onclick="login()">Entrar</button>

    <p id="erro" style="color:red;"></p>

    <hr>

    <p>💬 Suporte</p>
    <b>Master Gustavo</b>

    <a href="https://t.me/goul4t7a"
       target="_blank"
       style="display:block;margin-top:8px;
              padding:10px;
              background:#1f7a4c;
              color:#fff;
              border-radius:8px;
              text-decoration:none;">
      Abrir Telegram
    </a>

  </div>
</div>

<!-- ALERTA -->
<div id="alertBox">
  <h1>🚨 ALERTA</h1>
  <p id="alertMsg"></p>
  <button onclick="pararAlerta()">PARAR</button>
</div>

<!-- APP -->
<div class="container">

<button onclick="logout()" style="background:#b71c1c;">🚪 Sair</button>

<h2>LEMBRE JÁ</h2>

<input id="lembreteTexto" placeholder="Lembrete">
<input type="datetime-local" id="lembreteData">

<select id="tipoAlerta">
  <option value="alarme">🔊 Alarme</option>
  <option value="ligacao">📞 Ligação</option>
  <option value="voz">🎙 Voz</option>
</select>

<button onclick="criarLembrete()">Criar Lembrete</button>

<hr>

<h3>💧 Água</h3>
<button onclick="ativarAgua()">Ativar Água</button>
<button onclick="desativarAgua()" style="background:#b71c1c;">Desativar Água</button>
<div id="timerAgua" class="status">⏱ Inativo</div>

<h3>🕒 Ponto</h3>
<button onclick="ativarPonto()">Ativar Ponto</button>
<button onclick="desativarPonto()" style="background:#b71c1c;">Desativar Ponto</button>
<div id="timerPonto" class="status">⏱ Inativo</div>

<hr>

<h3>📂 Lembretes</h3>
<div id="lista"></div>

<hr>

<h3>📜 Histórico</h3>
<div id="hist"></div>

</div>

<script>

/* ================= LOGIN ================= */
function login(){

  const u=document.getElementById("user").value.trim().toLowerCase();
  const p=document.getElementById("pass").value.trim();
  const salvar=document.getElementById("salvarSenha").checked;

  if(u==="zevo" && p==="1206"){

    localStorage.setItem("logado","1");

    if(salvar){
      localStorage.setItem("user",u);
      localStorage.setItem("pass",p);
    } else {
      localStorage.removeItem("user");
      localStorage.removeItem("pass");
    }

    mostrar();
  } else {
    document.getElementById("erro").innerText="Login incorreto";
  }
}

function mostrar(){
  document.getElementById("login").style.display="none";
  document.querySelector(".container").style.display="block";
}

/* AUTO LOGIN */
window.onload=function(){

  if("Notification" in window)
    Notification.requestPermission();

  const u=localStorage.getItem("user");
  const p=localStorage.getItem("pass");

  if(u) document.getElementById("user").value=u;
  if(p) document.getElementById("pass").value=p;

  document.getElementById("salvarSenha").checked=(u&&p);

  if(localStorage.getItem("logado")==="1"){
    mostrar();
  }
};

/* LOGOUT */
function logout(){
  localStorage.removeItem("logado");
  location.reload();
}

/* SENHA */
function toggleSenha(){
  const p=document.getElementById("pass");
  p.type=p.type==="password"?"text":"password";
}

/* VOZ */
function falar(t){
  const u=new SpeechSynthesisUtterance(t);
  u.lang="pt-BR";
  speechSynthesis.speak(u);
}

/* ALERTA */
let som,loop;

function dispararAlerta(t){
  alertMsg.innerText=t;
  alertBox.style.display="flex";

  som=new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
  som.loop=true;
  som.play();

  loop=setInterval(()=>falar(t),4000);

  salvar("🚨 "+t);
}

function pararAlerta(){
  clearInterval(loop);
  if(som) som.pause();
  alertBox.style.display="none";
}

/* HISTÓRICO */
function salvar(t){
  hist.innerHTML=`<div class="status">${t}</div>`+hist.innerHTML;
}

/* ================= ÁGUA ================= */
let tAgua=null,tAguaVis=null,aguaSeg=3600;

function atualizarAgua(){
  let m=Math.floor(aguaSeg/60);
  let s=aguaSeg%60;
  document.getElementById("timerAgua").innerText=
    `⏱ ${m}:${s<10?"0":""}${s}`;
}

function ativarAgua(){

  desativarAgua();

  falar("Água ativado");
  salvar("💧 Água ativado");

  aguaSeg=3600;

  tAguaVis=setInterval(()=>{
    aguaSeg--;
    atualizarAgua();

    if(aguaSeg<=0){
      dispararAlerta("💧 BEBA ÁGUA");
      aguaSeg=3600;
    }
  },1000);

  tAgua=setInterval(()=>dispararAlerta("💧 BEBA ÁGUA"),3600000);
}

function desativarAgua(){
  clearInterval(tAgua);
  clearInterval(tAguaVis);
  tAgua=null;
  tAguaVis=null;
  document.getElementById("timerAgua").innerText="⏱ Inativo";
}

/* ================= PONTO ================= */
let tPonto=null,tPontoVis=null,pontoSeg=1200;

function atualizarPonto(){
  let m=Math.floor(pontoSeg/60);
  let s=pontoSeg%60;
  document.getElementById("timerPonto").innerText=
    `⏱ ${m}:${s<10?"0":""}${s}`;
}

function ativarPonto(){

  desativarPonto();

  falar("Ponto ativado");
  salvar("🕒 Ponto ativado");

  pontoSeg=1200;

  tPontoVis=setInterval(()=>{
    pontoSeg--;
    atualizarPonto();

    if(pontoSeg<=0){
      dispararAlerta("🕒 REGISTRE PONTO");
      pontoSeg=1200;
    }
  },1000);

  tPonto=setInterval(()=>dispararAlerta("🕒 REGISTRE PONTO"),1200000);
}

function desativarPonto(){
  clearInterval(tPonto);
  clearInterval(tPontoVis);
  tPonto=null;
  tPontoVis=null;
  document.getElementById("timerPonto").innerText="⏱ Inativo";
}

/* ================= LEMBRETES ================= */
let lemb=[];

function criarLembrete(){

  const txt=document.getElementById("lembreteTexto").value;
  const dt=new Date(document.getElementById("lembreteData").value);
  const tipo=document.getElementById("tipoAlerta").value;

  let tempo=dt-new Date();
  if(!txt||tempo<=0)return;

  const obj={id:Date.now(),txt,tempo:tempo/1000,tipo};
  lemb.push(obj);

  falar("Lembrete ativado");
  salvar("📂 "+txt);

  let loop=setInterval(()=>{

    obj.tempo--;

    if(obj.tempo<=0){
      clearInterval(loop);

      if(obj.tipo==="alarme"){
        new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg").play();
        dispararAlerta(obj.txt);
      }

      if(obj.tipo==="voz"){
        falar(obj.txt);
        dispararAlerta(obj.txt);
      }

      if(obj.tipo==="ligacao"){
        new Audio("https://actions.google.com/sounds/v1/telephony/telephone_ring.ogg").play();
        dispararAlerta("📞 "+obj.txt);
      }

      render();
    }

  },1000);

  render();
}

/* RENDER */
function render(){
  lista.innerHTML="";
  lemb.forEach(l=>{
    lista.innerHTML+=`<div class="status">${l.txt}</div>`;
  });
}

</script>

</body>
</html>
